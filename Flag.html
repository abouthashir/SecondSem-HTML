<!DOCTYPE html>
<html>
<head>
<title>Flag</title>
<style>
.flag{
	width: 300px;
	height: 180px;
	border: 2px solid black;
}
.saffron{
	height: 60px;
	background-color: orange;
}
.white{
	height: 60px;
	text-align: center;
	background-color: white;
	line-height: 60px;
	font-size: 30px
}
.green{
	height: 60px;
	background-color: green;
}
</style>
</head>
<body>
	<h1 align="center">Indian Flag</h1>

	<div class="flag">
	<div class="saffron"></div>
	<div class="white"></div>
	<div class="green"></div>
	</div>

</body>
</html>
